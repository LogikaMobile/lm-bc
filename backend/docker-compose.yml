version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: lmbc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: .
    ports:
      - "8090:8090"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/lmbc
    restart: always

volumes:
  postgres_data:
